<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <link rel="stylesheet" href="signup.css">
</head>
<body>

<div class="container">

    <div class="signup-box">

        <h1>Create Account</h1>
        <p>Join Dream Destination Today</p>

        <form id="signupForm">

            <input
                    type="text"
                    id="name"
                    placeholder="Full Name"
                    required>

            <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required>

            <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

            <button type="submit" class="signup-btn">
                Sign Up
            </button>

        </form>

        <div class="divider">
            <span>OR</span>
        </div>
        <button type="button" class="google-btn" onclick="googleLogin()">
         <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
    Continue with Google
     </button>
     <button type="button" class="microsoft-btn" onclick="microsoftLogin()">
           <img src="https://cdn-icons-png.flaticon.com/512/732/732221.png">
        Continue with Microsoft
        
     </button>

       

   <script>
   function googleLogin() {
    alert("Google Login will be added later.");
   }
   function microsoftLogin(){
    alert("Microsoft Login wiil  be added later.")
   }
  </script>

       

        <div class="login-link">
            Already have an account?
            <a href="index.html">Login</a>
        </div>

    </div>
    

</div>


<script src="signup.js"></script>

</body>
</html>
