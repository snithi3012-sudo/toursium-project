<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <link rel="stylesheet" href="contact.css">
</head>
<body>

<div class="container">

    <div class="contact-box">

        <h1>Contact Us</h1>
        <p>We'd love to hear from you!</p>

        <form id="contactForm">

            <input
                type="text"
                id="name"
                placeholder="Enter Your Name"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Enter Your Email"
                required
            >

            <input
                type="text"
                id="subject"
                placeholder="Subject"
                required
            >

            <textarea
                id="message"
                rows="5"
                placeholder="Enter Your Message"
                required
            ></textarea>

            <button type="submit">
                Send Message
            </button>

            <p id="successMsg"></p>

        </form>

        <div class="info">
            <p>📍 Salem, Tamil Nadu</p>
            <p>📞 +91 7598060621</p>
            <p>✉️ dreamdestination@gmail.com</p>
        </div>

    </div>

</div>

<script src="contact.js"></script>

</body>
</html>
