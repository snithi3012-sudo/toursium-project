<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Destinations</title>
    <link rel="stylesheet" href="ocean.css">
</head>
<body>

    <h1>Ocean Destinations</h1>

    <div class="places">

        <div class="card">
            <img src="https://media.istockphoto.com/id/1202427959/photo/sunset-at-tropical-beach-with-deck-chairs-under-ubrellas.jpg?s=612x612&w=0&k=20&c=5VwSzURPtMuH8yK-BUCjExIi6n4Hir3fzFbk0_JaNKg=" alt="Goa">
            <h2>Goa</h2>
            <p>Enjoy beautiful beaches, nightlife, and water sports.</p>
            <button>Explore</button>
        </div>

        <div class="card">
            <img src="https://t3.ftcdn.net/jpg/04/17/08/16/360_F_417081637_KDNznlDjp5ekEQb6dPKidJ29DYMdDSuO.jpg" alt="Pondicherry">
            <h2>Pondicherry</h2>
            <p>Relax at peaceful beaches and enjoy French-style streets.</p>
            <button>Explore</button>
        </div>

        <div class="card">
            <img src="https://maharajatravels.in/wp-content/uploads/2023/08/Andaman-Honeymoon1-1.jpg" alt="Andaman">
            <h2>Andaman</h2>
            <p>Crystal-clear water, coral reefs, and island adventures.</p>
            <button>Explore</button>
        </div>

        <div class="card">
            <img src="https://seasontours.org/wp-content/uploads/2024/04/4-29.webp" alt="Lakshadweep">
            <h2>Lakshadweep</h2>
            <p>Experience stunning lagoons and untouched beaches.</p>
            <button>Explore</button>
        </div>

    </div>

</body>
</html>
